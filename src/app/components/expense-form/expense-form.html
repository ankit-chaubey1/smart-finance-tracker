<div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
  
  <input [(ngModel)]="description" placeholder="Description (e.g. Lunch)" 
         style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; min-width: 150px; outline: none;">
  
  <input type="number" 
         [(ngModel)]="amount" 
         placeholder="Amount" 
         (focus)="$any($event.target).select()"
         style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100px; outline: none;">

  <select [(ngModel)]="category" 
          style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; outline: none;">
    <option value="Food">🍔 Food</option>
    <option value="Rent">🏠 Rent</option>
    <option value="Fun">🎉 Fun</option>
    <option value="Bills">⚡ Bills</option>
    <option value="Grocery">🛍️ Grocery</option>
    <option value="Clothes">👕 Clothes</option>
    <option value="Medical">💊 Medical</option>
    <option value="Travel">🚗 Travel</option>
    <option value="others">📦 Others</option>
  </select>

  <input type="date" [(ngModel)]="date" 
         style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; color: #555; cursor: pointer; outline: none;">

  <button (click)="submitExpense()" 
          style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;">
    + Add Expense
  </button>
</div>
