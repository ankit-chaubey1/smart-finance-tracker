<div style="max-width: 400px; margin: 80px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; font-family: sans-serif; text-align: center;">
  
  <h2 style="color: #333; margin-bottom: 20px;">
    {{ isLoginMode() ? 'Welcome Back! 👋' : 'Create Account ✨' }}
  </h2>

  <div style="margin-bottom: 15px;">
    <input type="email" [(ngModel)]="email" placeholder="Enter Email" 
           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;">
  </div>

  <div style="margin-bottom: 15px;">
    <input type="password" [(ngModel)]="password" placeholder="Enter Password" 
           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;">
  </div>

  @if (errorMessage()) {
    <p style="color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; font-size: 0.85rem;">
      ⚠️ {{ errorMessage() }}
    </p>
  }

  <button (click)="handleAuth()" 
          style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s;">
    {{ isLoginMode() ? 'Login' : 'Sign Up' }}
  </button>

  <p style="margin-top: 20px; color: #666; font-size: 0.9rem;">
    {{ isLoginMode() ? "Don't have an account?" : "Already have an account?" }} 
    <span (click)="toggleMode()" style="color: #007bff; cursor: pointer; font-weight: bold;">
      {{ isLoginMode() ? 'Create one' : 'Login here' }}
    </span>
  </p>
</div>
